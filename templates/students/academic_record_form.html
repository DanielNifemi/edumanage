{% extends 'base.html' %}

{% block content %}
<h2>Add Academic Record for {{ student.user.get_full_name }}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<a href="{% url 'student_detail' student.pk %}">Back to Student Details</a>
{% endblock %}
