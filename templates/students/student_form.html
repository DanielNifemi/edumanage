{% extends 'base.html' %}

{% block content %}
<h2>{% if form.instance.pk %}Edit Student{% else %}Add New Student{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
</form>
<a href="{% url 'student_list' %}">Back to Student List</a>
{% endblock %}
