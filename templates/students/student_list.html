{% extends 'base.html' %}

{% block content %}
<h2>Student List</h2>
<a href="{% url 'student_create' %}">Add New Student</a>
<table>
    <thead>
        <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Grade</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.student_id }}</td>
            <td>{{ student.user.get_full_name }}</td>
            <td>{{ student.grade }}</td>
            <td>
                <a href="{% url 'student_detail' student.pk %}">View</a>
                <a href="{% url 'student_update' student.pk %}">Edit</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No students found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
