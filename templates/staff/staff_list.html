{% extends 'base.html' %}

{% block content %}
<h2>Staff List</h2>
<table>
    <thead>
        <tr>
            <th>Name</th>
            <th>Employee ID</th>
            <th>Department</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for staff in staff_list %}
        <tr>
            <td>{{ staff.user.get_full_name }}</td>
            <td>{{ staff.employee_id }}</td>
            <td>{{ staff.department }}</td>
            <td>{{ staff.role }}</td>
            <td>
                <a href="{% url 'performance_evaluation' staff.id %}">Evaluate</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No staff members found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
