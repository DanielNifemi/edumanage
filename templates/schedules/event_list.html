{% extends 'base.html' %}

{% block content %}
<h2>Events</h2>
<table>
    <thead>
        <tr>
            <th>Title</th>
            <th>Start</th>
            <th>End</th>
            <th>Location</th>
        </tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td>{{ event.title }}</td>
            <td>{{ event.start_datetime }}</td>
            <td>{{ event.end_datetime }}</td>
            <td>{{ event.location }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No events scheduled.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{% url 'add_event' %}">Add Event</a>
{% endblock %}
