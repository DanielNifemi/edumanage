{% extends 'base.html' %}

{% block content %}
<h2>My Subjects</h2>
<table>
    <thead>
        <tr>
            <th>Subject Name</th>
            <th>Subject Code</th>
        </tr>
    </thead>
    <tbody>
        {% for subject in subjects %}
        <tr>
            <td>{{ subject.name }}</td>
            <td>{{ subject.code }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No subjects assigned yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
